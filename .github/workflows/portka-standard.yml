name: portka-standard

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Node test suite (game logic, dataset integrity, version sync)
        run: node --test tests/*.test.mjs
      - name: Portka standard checks (SemVer + CHANGELOG/README sync)
        run: bash tests/run-tests.sh
